<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Primary -->
    <title>D&amp;W Operations Hub</title>
    <meta name="description" content="Internal operations management for Dust &amp; Wipes Limited field teams." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#1B6B2F" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/favicon-48x48.png" />

    <!-- Apple / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="D&amp;W Hub" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png" />

    <!-- iOS Splash Screen -->
    <link rel="apple-touch-startup-image"
          href="/icons/splash-1170x2532.png"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="D&amp;W Hub" />

    <!-- Windows Tile -->
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-TileColor" content="#0B3518" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Dust &amp; Wipes Operations Hub" />
    <meta property="og:description" content="Internal operations app for Dust &amp; Wipes Limited." />
    <meta property="og:image"       content="/icons/icon-512x512.png" />
    <meta property="og:url"         content="https://app.dustandwipes.com" />
  </head>

  <body>
    <noscript>
      <div style="font-family:sans-serif;text-align:center;padding:40px;color:#0B3518;">
        <h2>JavaScript Required</h2>
        <p>Please enable JavaScript to use the Dust &amp; Wipes Operations Hub.</p>
      </div>
    </noscript>

    <div id="root"></div>

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then(function (reg) {
              console.log("[App] SW registered:", reg.scope);
              reg.addEventListener("updatefound", function () {
                const nw = reg.installing;
                nw.addEventListener("statechange", function () {
                  if (nw.state === "installed" && navigator.serviceWorker.controller) {
                    console.log("[App] New version available — refresh to update.");
                  }
                });
              });
            })
            .catch(function (err) {
              console.error("[App] SW registration failed:", err);
            });
        });
      }
    </script>

    <!-- Install prompt capture -->
    <script>
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__installPrompt = e;
      });
      window.addEventListener("appinstalled", function () {
        window.__installPrompt = null;
      });
    </script>
  </body>
</html>
