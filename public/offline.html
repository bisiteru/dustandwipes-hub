<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — D&amp;W Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0B3518;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .brand { font-size: 13px; color: #6EAD7E; margin-bottom: 20px; font-weight: 600; }
    p { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #E85D04; color: white; border: none;
      border-radius: 12px; padding: 14px 28px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; width: 100%; margin-bottom: 10px;
    }
    .secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
    }
    .tips { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align: left; }
    .tips h2 { font-size: 11px; font-weight: 700; color: #6EAD7E; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .tips li { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: 16px; margin-bottom: 5px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <div class="brand">Dust &amp; Wipes Operations Hub</div>
    <p>No internet connection detected. Some features require a live connection to the server.</p>
    <button onclick="location.reload()">Try Again</button>
    <button class="secondary" onclick="history.back()">← Go Back</button>
    <div class="tips">
      <h2>You Can Still View:</h2>
      <ul>
        <li>Recently loaded jobs and schedules</li>
        <li>Cached client information</li>
        <li>Previously viewed site reports</li>
      </ul>
    </div>
  </div>
  <script>
    window.addEventListener("online", function () { location.reload(); });
  </script>
</body>
</html>
